---
# Cluster-wide variables for OPORD Phase 2 (Kubernetes bootstrap).
# control_plane_endpoint and control_plane_endpoint_port come from the inventory
# (emitted by modules/vsphere-k8s).

# Kubernetes version
k8s_version: "1.34.3"
k8s_apt_version: "1.34.3-*"
k8s_apt_repo_version: "v1.34"

# Container runtime
containerd_version: "2.2.*"

# Cluster networking
pod_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"
dns_domain: "cluster.local"

# CNI (installed after kubeadm bootstrap)
cni_plugin: "cilium"

# Node OS configuration
disable_swap: true
configure_firewall: true
ntp_enabled: true
ntp_timezone: "UTC"

k8s_kernel_modules:
  - overlay
  - br_netfilter

k8s_sysctl_params:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

# Admin user that owns the kubeconfig. Follows the inventory's ansible_user
# (set by the provider from the cluster's ssh_user) instead of being hardcoded.
admin_user: "{{ ansible_user | default('debian') }}"
admin_group: "{{ admin_user }}"
