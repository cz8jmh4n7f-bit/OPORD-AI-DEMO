---
- name: Check if Kubernetes cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_already_init

- name: Generate certificate key for HA control plane
  ansible.builtin.command:
    cmd: kubeadm certs certificate-key
  register: kubeadm_cert_key
  changed_when: false
  when: not kubeadm_already_init.stat.exists

- name: Set certificate key fact
  ansible.builtin.set_fact:
    certificate_key: "{{ kubeadm_cert_key.stdout }}"
  when: not kubeadm_already_init.stat.exists

- name: Template kubeadm configuration file
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    owner: root
    group: root
    mode: "0600"
  when: not kubeadm_already_init.stat.exists

- name: Initialize Kubernetes cluster with kubeadm
  ansible.builtin.command:
    cmd: >-
      kubeadm init
      --config /tmp/kubeadm-config.yaml
      --upload-certs
  register: kubeadm_init_result
  when: not kubeadm_already_init.stat.exists

- name: Clean up kubeadm config file
  ansible.builtin.file:
    path: /tmp/kubeadm-config.yaml
    state: absent

- name: Create .kube directory for admin user
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.kube"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_group }}"
    mode: "0755"

- name: Copy admin kubeconfig to user directory
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ admin_user }}/.kube/config"
    remote_src: true
    owner: "{{ admin_user }}"
    group: "{{ admin_group }}"
    mode: "0600"

- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy admin kubeconfig to root
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: Generate join command for worker nodes
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false

- name: Set join command fact
  ansible.builtin.set_fact:
    k8s_join_command: "{{ kubeadm_join_command.stdout }}"

- name: Upload certificates and get certificate key (for additional CPs)
  ansible.builtin.command:
    cmd: kubeadm init phase upload-certs --upload-certs
  register: kubeadm_upload_certs
  changed_when: false

- name: Extract certificate key from upload-certs output
  ansible.builtin.set_fact:
    k8s_certificate_key: "{{ kubeadm_upload_certs.stdout_lines[-1] }}"

- name: Set control plane join command fact
  ansible.builtin.set_fact:
    k8s_cp_join_command: "{{ k8s_join_command }} --control-plane --certificate-key {{ k8s_certificate_key }}"
