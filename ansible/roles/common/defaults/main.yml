---
disable_swap: true
configure_firewall: true
ntp_enabled: true
ntp_timezone: "UTC"

k8s_kernel_modules:
  - overlay
  - br_netfilter

k8s_sysctl_params:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

base_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - chrony
  - bash-completion
  - jq
  - socat
  - conntrack
  - ipset
  - ipvsadm
  - ebtables
