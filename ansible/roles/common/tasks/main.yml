---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
    autoremove: true

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ ntp_timezone }}"
  when: ntp_enabled

- name: Enable and start chrony NTP service
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true
  when: ntp_enabled

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Build /etc/hosts entries for all cluster nodes
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ".*{{ hostvars[item].inventory_hostname }}$"
    line: "{{ hostvars[item].ansible_host }} {{ hostvars[item].inventory_hostname }}"
    state: present
  loop: "{{ groups['k8s_cluster'] }}"

- name: Ensure localhost entry exists in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.0\\.1"
    line: "127.0.0.1 localhost"
    state: present

- name: Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: false
  when: disable_swap

- name: Remove swap entries from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+\S+\s+swap\s+'
    state: absent
  when: disable_swap

- name: Ensure swap is disabled via systemd
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - swap.target
  failed_when: false
  when: disable_swap

- name: Load required kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k8s_kernel_modules }}"

- name: Ensure kernel modules load on boot
  ansible.builtin.copy:
    content: |
      {% for mod in k8s_kernel_modules %}
      {{ mod }}
      {% endfor %}
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure sysctl parameters for Kubernetes
  ansible.builtin.template:
    src: sysctl-k8s.conf.j2
    dest: /etc/sysctl.d/99-kubernetes.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl settings

- name: Apply sysctl settings immediately
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

- name: Check if firewalld is installed
  ansible.builtin.command:
    cmd: dpkg -l firewalld
  register: firewalld_check
  failed_when: false
  changed_when: false

- name: Disable and stop firewalld if present
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  when:
    - configure_firewall
    - firewalld_check.rc == 0
