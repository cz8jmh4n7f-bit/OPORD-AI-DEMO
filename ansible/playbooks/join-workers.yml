---
# Phase 2, step 4: join worker nodes.
- name: Generate join command from init control plane
  hosts: control_plane_init
  become: true
  gather_facts: true
  tasks:
    - name: Generate join command
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: false

    - name: Set join command fact
      ansible.builtin.set_fact:
        k8s_join_command: "{{ kubeadm_join_cmd.stdout }}"

- name: Join worker nodes to the cluster
  hosts: workers
  become: true
  gather_facts: true
  any_errors_fatal: true

  tasks:
    - name: Check if already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join as worker
      ansible.builtin.command:
        cmd: "{{ hostvars[groups['control_plane_init'][0]]['k8s_join_command'] }}"
      when: not kubelet_conf.stat.exists
