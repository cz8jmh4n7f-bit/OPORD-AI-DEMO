---
# Phase 2, step 5: install the Cilium CNI (cluster stays NotReady until a CNI is up).
# Requires helm + kubectl present on the init control plane (baked into the template).
- name: Install Cilium CNI
  hosts: control_plane_init
  become: true
  gather_facts: true
  any_errors_fatal: true

  vars:
    cilium_namespace: "kube-system"
    cilium_chart_version: "1.19.2"
    cilium_l2_interface: "ens33"
    cilium_lb_pool_start: "10.0.0.90"
    cilium_lb_pool_stop: "10.0.0.100"
    kubeconfig_path: "/home/{{ admin_user }}/.kube/config"
    helm_bin: "/usr/local/bin/helm"

  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Add Cilium helm repository
      ansible.builtin.command:
        cmd: "{{ helm_bin }} repo add cilium https://helm.cilium.io/"
      register: cilium_repo_add
      changed_when: "'has been added' in cilium_repo_add.stdout"
      failed_when: false

    - name: Update helm repositories
      ansible.builtin.command:
        cmd: "{{ helm_bin }} repo update"
      changed_when: false

    - name: Check if cilium is already installed
      ansible.builtin.command:
        cmd: "{{ helm_bin }} status cilium -n {{ cilium_namespace }}"
      register: cilium_status
      changed_when: false
      failed_when: false

    - name: Install or upgrade Cilium
      ansible.builtin.command:
        cmd: >-
          {{ helm_bin }} upgrade --install cilium cilium/cilium
          --namespace {{ cilium_namespace }}
          {{ ('--version ' + cilium_chart_version) if cilium_chart_version else '' }}
          --set operator.replicas=1
          --set ipam.mode=kubernetes
          --set kubeProxyReplacement=true
          --set k8sServiceHost={{ control_plane_endpoint }}
          --set k8sServicePort={{ control_plane_endpoint_port }}
          --set hubble.enabled=true
          --set hubble.relay.enabled=true
          --set hubble.ui.enabled=true
          --set l2announcements.enabled=true
          --set externalIPs.enabled=true
          --set egressGateway.enabled=true
          --set enableIPv4Masquerade=true
          --set bpf.masquerade=true
          --wait
          --timeout 15m
      register: cilium_install
      changed_when: "'STATUS: deployed' in cilium_install.stdout"
      retries: 2
      delay: 30
      until: cilium_install.rc == 0

    - name: Wait for Cilium DaemonSet to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status daemonset/cilium
          -n {{ cilium_namespace }}
          --timeout=300s
      changed_when: false
      retries: 3
      delay: 10
      register: cilium_ds_status
      until: cilium_ds_status.rc == 0

    - name: Wait for Cilium Operator to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/cilium-operator
          -n {{ cilium_namespace }}
          --timeout=300s
      changed_when: false
      retries: 3
      delay: 10
      register: cilium_operator_status
      until: cilium_operator_status.rc == 0

    - name: Wait for all nodes to be Ready
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          kubectl get nodes --no-headers | awk '{print $2}' | grep -v "^Ready$" | wc -l
      register: not_ready_count
      changed_when: false
      retries: 30
      delay: 10
      until: not_ready_count.stdout | trim | int == 0

    - name: Display node status
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      register: node_status
      changed_when: false

    - name: Show node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout_lines }}"

    - name: Apply Cilium L2 AnnouncementPolicy
      ansible.builtin.command:
        cmd: kubectl apply -f -
        stdin: |
          apiVersion: cilium.io/v2alpha1
          kind: CiliumL2AnnouncementPolicy
          metadata:
            name: default-l2
          spec:
            interfaces:
              - {{ cilium_l2_interface }}
            externalIPs: true
            loadBalancerIPs: true
      register: l2_policy
      changed_when: "'created' in l2_policy.stdout"

    - name: Apply Cilium LoadBalancer IP Pool
      ansible.builtin.command:
        cmd: kubectl apply -f -
        stdin: |
          apiVersion: cilium.io/v2alpha1
          kind: CiliumLoadBalancerIPPool
          metadata:
            name: default-pool
          spec:
            blocks:
              - start: {{ cilium_lb_pool_start }}
                stop: {{ cilium_lb_pool_stop }}
      register: lb_pool
      changed_when: "'created' in lb_pool.stdout"
