# Managed Redis on Azure Cache for Redis (kind=cache).
# Created in its own resource group, TLS-only. Access keys are read from Azure,
# never persisted by OPORD. Default Basic C0 (250MB); num_cache_nodes>1 to Standard.
#   opord cache create -f examples/cache-azure.yaml [--dry-run]
name: sessions
provider: Azure
environment: dev
spec:
  name: opordsessions
  engine_version: "6"
  num_cache_nodes: 1
