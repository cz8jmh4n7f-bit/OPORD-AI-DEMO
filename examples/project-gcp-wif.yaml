# Grant a Microsoft Entra group access to a GCP project via Workforce Identity
# Federation (ADR-0012). Prereq: the WIF pool exists (modules/gcp-workforce-pool,
# one-time per org) and its id is in the GCP provider config as `workforce_pool_id`
# (or set it here). The Entra group's OBJECT ID goes in entra_group_ids.
#
#   opord project create -f examples/project-gcp-wif.yaml --dry-run
#
name: data-team-gcp
provider: gcp-dev
spec:
  # account_id: my-project-id        # omit to default to the provider's project_id
  role_name: roles/viewer            # the IAM role granted on the project
  workforce_pool_id: opord-entra     # omit to read from provider config
  entra_group_ids:
    - "11111111-2222-3333-4444-555555555555"   # Entra group object id (GUID)
  # user_names:                      # optional: also grant bare Google identities
  #   - alice@example.com
