# Cluster bound to the vcsim-backed "sim" provider (for live-status demo).
name: sim-k8s
environment: dev
provider: sim
spec:
  kubernetes_version: "1.34.3"
  cni: cilium
  template: DC0_H0_VM0
  control_plane:
    count: 1
    name_prefix: sim-cp
    ip_start: 10.0.2.10
    specs: { cpu: 2, memory_mb: 4096, disk_gb: 40 }
  workers:
    count: 1
    name_prefix: sim-worker
    ip_start: 10.0.2.20
    specs: { cpu: 2, memory_mb: 4096, disk_gb: 40 }
  networking:
    netmask: "255.255.255.0"
    gateway: 10.0.2.1
    dns_servers: [192.168.2.3]
    dns_suffix: sim.local
    control_plane_endpoint: 10.0.2.10
    control_plane_endpoint_port: 6443
    pod_cidr: 10.244.0.0/16
    service_cidr: 10.96.0.0/12
  ssh_user: debian
  ssh_public_key: "ssh-rsa AAAA-sim-key"
