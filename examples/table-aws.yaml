# Managed NoSQL table (AWS DynamoDB). On-demand billing (PAY_PER_REQUEST) = no
# capacity planning, pay-per-request. Provider must be a registered aws provider.
#   opord table create -f examples/table-aws.yaml [--dry-run]
# Note: key types are quoted - unquoted N/Y are YAML booleans.
name: orders
environment: dev
provider: aws-eu
spec:
  hash_key: id
  hash_key_type: "S"
  range_key: created_at
  range_key_type: "N"
  billing_mode: PAY_PER_REQUEST
  ttl_hours: 1
