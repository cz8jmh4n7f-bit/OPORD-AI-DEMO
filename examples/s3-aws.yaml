# Object storage bucket (AWS S3) - kind=s3.
# The first-class OPORD primitive keeps buckets private + versioned by default.
# Use the generic Stack primitive for unusual public/static-website buckets.
#
#   opord s3 create -f examples/s3-aws.yaml --dry-run
#
# Bucket names are globally unique. Change the suffix before a live test.
name: opord-s3test-example
environment: dev
provider: aws-eu
spec:
  name: opord-s3test-example
  lifecycle_glacier_days: 0
  ttl_hours: 1
