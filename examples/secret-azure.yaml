# Managed secret on Azure Key Vault (kind=secret).
# The provider-neutral SecretSpec maps onto a Key Vault (the secret container).
# The vault is created with purge protection off so it can be destroyed cleanly
# in dev. Secret values are set out-of-band.
#   opord secret create -f examples/secret-azure.yaml [--dry-run]
name: app-secrets
provider: Azure
environment: dev
spec:
  name: opordapp
