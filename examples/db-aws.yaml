# Managed Postgres (RDS) on AWS (provider must be a registered aws provider with
# region + subnet_ids in its config).
#   opord db create -f examples/db-aws.yaml --dry-run
# The master password is never handled by OPORD - RDS stores it in Secrets Manager.
name: app-db
environment: dev
provider: aws-eu
spec:
  engine: postgres
  version: "16"
  instance_class: db.t3.micro
  storage_gb: 20
  db_name: app
  username: appuser
  multi_az: false
  public_access: false
  ttl_hours: 0
