# Managed secret on AWS Secrets Manager (kind=secret).
# OPORD provisions the secret container only - the plaintext value is set
# out-of-band (console / CLI / Vault-sync), so OPORD never holds credentials.
#   opord secret create -f examples/secret-aws.yaml [--dry-run]
name: jwt-key
provider: aws-eu
environment: dev
spec:
  name: prod/api/jwt-key
  description: JWT signing key for the API
  recovery_window_days: 7
