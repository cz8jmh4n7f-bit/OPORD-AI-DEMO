# Intentionally invalid: even control-plane count (must be odd). For testing validation.
name: k8s-bad
environment: dev
provider: vsphere-dev
spec:
  kubernetes_version: "1.34.3"
  cni: cilium
  template: debian-12
  control_plane:
    count: 2
    name_prefix: bad-cp
    ip_start: 10.0.0.80
    specs: { cpu: 4, memory_mb: 8192, disk_gb: 50 }
  workers:
    count: 2
    name_prefix: bad-worker
    ip_start: 10.0.0.85
    specs: { cpu: 4, memory_mb: 8192, disk_gb: 50 }
  networking:
    gateway: 10.0.0.1
    dns_servers: [192.168.2.3]
    control_plane_endpoint: 10.0.0.80
