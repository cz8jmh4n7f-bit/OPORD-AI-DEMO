# Minimal demonstration of environment output-to-input piping (ADR-0008).
#
# Two components:
#   1. jwt-secret  - a Secrets Manager entry (wave 0).
#   2. assets      - an S3 bucket tagged with the Secret's ARN (wave 1).
#
# OPORD topologically orders these into two waves: jwt-secret has no deps so
# it goes first; assets references ${jwt-secret.outputs.secret_arn} so it waits
# until jwt-secret reaches `ready`, reads its tofu output `secret_arn`, then
# substitutes the value into the tag before running tofu apply.
#
# Usage:
#   opord env create -f examples/env-pipe-demo.yaml
#   opord env status pipe-demo                  # watch waves progress
#   opord env destroy pipe-demo --yes           # cleans up both
#
# Cost: ~$0 (S3 free for empty bucket; Secret $0.40/mo prorated).
# Bucket names are globally unique - change the suffix if it already exists.

name: pipe-demo
environment: dev
provider: aws-eu

components:
  - name: jwt-secret
    kind: stack
    stack:
      module_dir: modules/aws-secret
      variables:
        region: eu-central-1
        name: pipe-demo/jwt
        description: JWT signing key (piping demo)
        recovery_window_days: 0   # force-delete on destroy (dev only)

  - name: assets
    kind: stack
    stack:
      module_dir: modules/aws-s3-bucket
      variables:
        region: eu-central-1
        name: opord-pipe-demo-2026
        versioning: true
        block_public_access: true
        tags:
          # Piped: this string is replaced with the Secret's ARN after
          # jwt-secret reaches `ready`. Whole-string placeholder preserves
          # the typed value; inline (e.g. "url=${...}") would stringify.
          jwt_secret_arn: "${jwt-secret.outputs.secret_arn}"
          demo: pipe-demo
