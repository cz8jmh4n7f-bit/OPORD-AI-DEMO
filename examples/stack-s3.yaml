# Generic stack: provision an arbitrary OpenTofu module (here, an S3 bucket).
#   opord stack create -f examples/stack-s3.yaml --dry-run
# module_dir points at any root Tofu module (no backend block - OPORD injects a
# workspace-isolated pg backend). variables are passed straight through.
name: assets
environment: dev
provider: aws-eu
spec:
  module_dir: modules/examples/s3-bucket
  variables:
    region: eu-central-1
    bucket_name: opord-assets-demo-0001
    environment: dev
