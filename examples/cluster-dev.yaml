# Example OPORD cluster spec.
#   opord cluster create -f examples/cluster-dev.yaml --dry-run
# 'provider' must reference a registered provider (opord provider add --name ...).
name: k8s-dev
environment: dev
provider: vsphere-dev
spec:
  kubernetes_version: "1.34.3"
  cni: cilium
  template: debian-12
  control_plane:
    count: 3
    name_prefix: k8s-dev-cp
    ip_start: 10.0.0.80
    specs: { cpu: 4, memory_mb: 8192, disk_gb: 50 }
  workers:
    count: 4
    name_prefix: k8s-dev-worker
    ip_start: 10.0.0.85
    specs: { cpu: 4, memory_mb: 8192, disk_gb: 50 }
  networking:
    netmask: "255.255.255.0"
    gateway: 10.0.0.1
    dns_servers: [192.168.2.3]
    dns_suffix: k8s.local
    control_plane_endpoint: 10.0.0.80
    control_plane_endpoint_port: 6443
    pod_cidr: 10.244.0.0/16
    service_cidr: 10.96.0.0/12
  ssh_user: debian
  ssh_public_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQAB-example-key vvovc@example.com"
