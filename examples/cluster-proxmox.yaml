# Kubernetes cluster on Proxmox (provider must be a registered proxmox provider).
#   opord cluster create -f examples/cluster-proxmox.yaml --dry-run
name: k8s-pmox
environment: dev
provider: pve-lab
spec:
  kubernetes_version: "1.34.3"
  cni: cilium
  template: "9000" # Proxmox template VMID
  control_plane:
    count: 1
    name_prefix: pmox-cp
    ip_start: 10.0.0.60
    specs: { cpu: 2, memory_mb: 4096, disk_gb: 40 }
  workers:
    count: 2
    name_prefix: pmox-worker
    ip_start: 10.0.0.70
    specs: { cpu: 2, memory_mb: 4096, disk_gb: 40 }
  networking:
    netmask: "255.255.255.0"
    gateway: 10.0.0.1
    dns_servers: [1.1.1.1]
    dns_suffix: cluster.local
    control_plane_endpoint: 10.0.0.60
    control_plane_endpoint_port: 6443
    pod_cidr: 10.244.0.0/16
    service_cidr: 10.96.0.0/12
  ssh_user: debian
  ssh_public_key: "ssh-rsa AAAA-proxmox-example"
