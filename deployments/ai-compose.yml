# OPORD - AI Service Governance: self-contained stack (db + migrate + api + worker + web).
#
#   docker compose -f deployments/ai-compose.yml up --build
#
# Then open http://localhost:3000 and click the "AI" sign -> "Enter the AI workspace".
# The catalog is seeded with MockAI, so it works with NO secrets.
#
# To govern a REAL provider, store its key in the bundled OpenBao secret store and
# reference it by path - the key is encrypted at rest, never in OPORD's DB or env.
# OpenBao is persistent (survives restarts; only `down -v` wipes it), auto-unsealed,
# and has its web UI on http://localhost:8200/ui (token: opord-ai-root). Via CLI:
#
#   docker compose -f deployments/ai-compose.yml up -d
#   docker compose -f deployments/ai-compose.yml exec openbao \
#     bao kv put secret/opord/ai/openai-main api_key=sk-...
#   # then in the UI: Add provider (OpenAI) -> secret_ref = opord/ai/openai-main -> Check -> Sync
#
# Quick alternative (no secret store) - pass the key as an env var on `up`:
#   OPENAI_API_KEY=sk-... docker compose -f deployments/ai-compose.yml up -d
#
# API: http://localhost:8080  (auth disabled in this demo profile).

name: opord-ai

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opord
      POSTGRES_PASSWORD: opord
      POSTGRES_DB: opord
    volumes:
      - opord_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opord -d opord"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Secret store (OpenBao - the MPL-2.0 Vault fork) so provider API keys are stored
  # encrypted and read by reference (secret_ref), never kept in OPORD's DB or env.
  # PERSISTENT file storage (secrets survive restarts and `down`; only `down -v`
  # wipes them) with the openbao-init sidecar auto-initializing and auto-unsealing,
  # so no manual unseal is ever needed. Published on 127.0.0.1:8200 - web UI at
  # http://localhost:8200/ui (token: opord-ai-root), or
  # `docker compose exec openbao bao kv ...` from the CLI.
  openbao:
    image: openbao/openbao:2.5.4
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_ADDR: "http://127.0.0.1:8200"
      BAO_TOKEN: "opord-ai-root"
    command: ["server", "-config=/openbao/config/config.hcl"]
    volumes:
      - opord_ai_openbao:/openbao/file
      - ./openbao/ai/config.hcl:/openbao/config/config.hcl:ro
    ports:
      - "127.0.0.1:8200:8200"
    # Healthy only once unsealed AND the KV v2 "secret/" engine is listable with
    # the service token - so the very first `bao kv put secret/...` right after
    # `up` cannot race init/unseal/mount. `api` depends on this, so it waits too.
    healthcheck:
      test: ["CMD-SHELL", "bao secrets list 2>/dev/null | grep -q '^secret/'"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 3s

  # Auto-init / auto-unseal daemon: first boot initializes (1 share) and stores
  # the unseal key in the data volume (.init.txt - fine for a LOCAL test stack);
  # every later boot just unseals. Also ensures the secret/ KV v2 mount and the
  # fixed opord-ai-root service token the api/worker use.
  openbao-init:
    image: openbao/openbao:2.5.4
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/openbao-init.sh"]
    environment:
      BAO_ADDR: "http://openbao:8200"
    volumes:
      - opord_ai_openbao:/openbao/file
      - ./openbao/ai/init.sh:/openbao-init.sh:ro
    depends_on:
      openbao:
        condition: service_started

  # One-shot: applies goose migrations (which also seed the MockAI catalog), then exits.
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migrate
    command: ["-dir", "/migrations", "postgres", "postgres://opord:opord@db:5432/opord?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://opord:opord@db:5432/opord?sslmode=disable"
      OPORD_HTTP_ADDR: ":8080"
      OPORD_AUTH_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Read provider keys from the bundled OpenBao by secret_ref (KV v2 mount "secret").
      VAULT_ADDR: "http://openbao:8200"
      VAULT_TOKEN: "opord-ai-root"
    ports:
      - "${OPORD_API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      openbao:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://opord:opord@db:5432/opord?sslmode=disable"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Server-side rendering reaches the API over the compose network; the
      # browser uses the published http://localhost:8080 (the client default).
      OPORD_API_URL: "http://api:8080"
      NODE_ENV: production
    ports:
      - "${OPORD_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  # LiteLLM proxy - an OPTIONAL, ADDITIONAL integration (one way to wire a data
  # plane; OPORD governs OpenAI/Anthropic directly too). Behind the "litellm"
  # compose profile so it does NOT start by default:
  #   docker compose -f deployments/ai-compose.yml --profile litellm up -d
  # When enabled, OPORD (the control plane) mints scoped virtual keys here on
  # approval and revokes them; LiteLLM enforces budget/model limits at runtime.
  # The bundled config registers a mock model so a key can be minted with no real
  # upstream creds (swap in real models via deployments/litellm/config.yaml).
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    profiles: ["litellm"]
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: "sk-opord-litellm-master"
      DATABASE_URL: "postgres://opord:opord@db:5432/litellm?sslmode=disable"
      STORE_MODEL_IN_DB: "true"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  opord_ai_pgdata:
  opord_ai_openbao:
